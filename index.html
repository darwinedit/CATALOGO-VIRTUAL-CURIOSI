<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curiosi — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CONFIGURACIÓN RÁPIDA — edita estos textos si quieres,
   pero lo importante (whatsapp, nombre, productos) está en el
   bloque de JavaScript al final del archivo, en el objeto CONFIG.
   Paleta tomada directamente del logo de Curiosi.
   ============================================================ */

:root{
  --orange:       #BF6832;
  --orange-dark:  #8F4C22;
  --orange-deep:  #6E3A19;
  --orange-light: #E7A874;
  --cream:        #FCF3E7;
  --ink:          #33220F;
  --wa-green:     #25D366;
  --shadow: 0 10px 28px rgba(110,58,25,0.20);
  --radius: 18px;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  background:
    radial-gradient(circle at 15% 5%, rgba(255,255,255,0.35), transparent 40%),
    var(--cream);
  background-attachment: fixed;
  color: var(--ink);
  font-family: 'Work Sans', sans-serif;
  padding-bottom: 120px;
}

/* subtle paper texture using layered gradients */
body::before{
  content:"";
  position: fixed; inset:0;
  background-image:
    repeating-linear-gradient(90deg, rgba(35,33,29,0.02) 0px, rgba(35,33,29,0.02) 1px, transparent 1px, transparent 3px);
  pointer-events:none;
  z-index:0;
}

.display{ font-family:'Baloo 2', sans-serif; letter-spacing:0.3px; }
.mono{ font-family:'IBM Plex Mono', monospace; }

/* ---------------- HEADER / HERO ---------------- */
header.hero{
  position:relative;
  padding: 30px 20px 64px;
  text-align:center;
  overflow:hidden;
  background: var(--orange);
  color: var(--cream);
}

.logo-img{
  width: 150px;
  height: 150px;
  border-radius: 32px;
  margin: 18px auto 0;
  display:block;
  box-shadow: 0 10px 26px rgba(0,0,0,0.25);
}

.store-name{
  font-size: clamp(24px, 5vw, 34px);
  color: var(--cream);
  text-transform: uppercase;
  margin-top: 16px;
  line-height:1.05;
}

.store-tag{
  margin-top:10px;
  font-size: 15px;
  color: rgba(255,255,255,0.92);
  max-width: 480px;
  margin-left:auto; margin-right:auto;
}

.stamp{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:20px;
  background: var(--cream);
  color: var(--orange-deep);
  padding: 8px 18px;
  border-radius: 999px;
  transform: rotate(-3deg);
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size: 13px;
  letter-spacing: 0.5px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.18);
}

.hero-wave{
  position:absolute; left:0; right:0; bottom:-1px;
  width:100%; height:40px; display:block;
}

/* ---------------- FILTERS ---------------- */
.filters{
  position:relative; z-index:1;
  display:flex; gap:10px; flex-wrap:wrap;
  justify-content:center;
  padding: 0 16px 28px;
}

.chip{
  font-family:'IBM Plex Mono', monospace;
  font-size: 13px;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--cream);
  border: 2px solid var(--ink);
  cursor:pointer;
  transition: all .15s ease;
  user-select:none;
}
.chip:hover{ transform: translateY(-2px); }
.chip.active{
  background: var(--ink);
  color: var(--cream);
}

/* ---------------- ADMIN BAR ---------------- */
.admin-bar{
  position:relative; z-index:1;
  max-width: 1100px;
  margin: 0 auto 20px;
  padding: 0 16px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.btn-ghost{
  font-family:'IBM Plex Mono', monospace;
  font-size:13px;
  background:transparent;
  border: 2px dashed var(--ink);
  color: var(--ink);
  padding: 8px 14px;
  border-radius: var(--radius);
  cursor:pointer;
}
.btn-ghost:hover{ background: rgba(35,33,29,0.06); }

/* ---------------- GRID ---------------- */
.grid{
  position:relative; z-index:1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 16px;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 22px;
}

.empty-state{
  grid-column: 1/-1;
  text-align:center;
  padding: 60px 20px;
  color:#6b6558;
  font-family:'IBM Plex Mono', monospace;
}

/* ---- Product card styled like a shipping tag ---- */
.card{
  position:relative;
  background: var(--cream);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display:flex;
  flex-direction:column;
  overflow:visible;
  transition: transform .18s ease;
}
.card:hover{ transform: translateY(-4px); }

.card::before{
  /* burbuja decorativa esquina superior, a tono con las curvas del logo */
  content:"";
  position:absolute;
  top: -8px; left: 18px;
  width: 26px; height:26px;
  background: var(--orange-light);
  border-radius: 50%;
  z-index: 2;
  opacity: 0.85;
}

.card .tag-edge{
  position:absolute;
  top:0; left:0; bottom:0; width: 8px;
  background: var(--orange);
  border-radius: var(--radius) 0 0 var(--radius);
  opacity:0.9;
}

.card-img-wrap{
  width:100%;
  aspect-ratio: 1/1;
  background: var(--orange-light);
  overflow:hidden;
  border-bottom: 3px solid var(--orange);
}
.card-img-wrap img{
  width:100%; height:100%; object-fit:cover; display:block;
}

.card-body{
  padding: 14px 16px 16px;
  display:flex; flex-direction:column; gap:8px; flex:1;
}

.card-category{
  font-family:'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--orange);
  text-transform:uppercase;
  letter-spacing: 1px;
}

.card-name{
  font-weight:700;
  font-size: 16px;
  line-height:1.25;
}

.card-desc{
  font-size: 13px;
  color: #57523f;
  line-height:1.4;
  flex:1;
}

.card-price-row{
  display:flex; align-items:center; justify-content:space-between;
  margin-top: 4px;
  border-top: 2px dotted var(--orange-light);
  padding-top: 10px;
}

.card-price{
  font-family:'Baloo 2', sans-serif;
  font-weight:700;
  font-size: 18px;
  color: var(--orange-dark);
}

.barcode{
  height: 14px; width: 46px;
  background:
    radial-gradient(circle, var(--orange-light) 2.5px, transparent 2.6px) 0 0/10px 10px;
  opacity:0.9;
}

.card-controls{
  display:flex; align-items:center; justify-content:space-between;
  gap:8px;
  margin-top:10px;
}

.qty-control{
  display:flex; align-items:center;
  border: 2px solid var(--ink);
  border-radius: var(--radius);
  overflow:hidden;
}
.qty-control button{
  background: var(--ink);
  color: var(--cream);
  border:none;
  width:30px; height:30px;
  font-size:16px;
  cursor:pointer;
}
.qty-control input{
  width:36px; text-align:center;
  border:none;
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  font-size:14px;
}
.qty-control input:focus{ outline:none; }

.add-btn{
  flex:1;
  background: var(--orange);
  color: var(--cream);
  border:none;
  padding: 9px 10px;
  font-weight:600;
  font-size:13px;
  border-radius: var(--radius);
  cursor:pointer;
  transition: filter .15s ease;
}
.add-btn:hover{ filter: brightness(1.08); }
.add-btn.added{ background: var(--orange-dark); }

.card-admin-actions{
  position:absolute; top:10px; right:10px;
  display:flex; gap:6px;
  z-index:3;
}
.icon-btn{
  width:28px; height:28px;
  border-radius:50%;
  border: none;
  background: var(--cream);
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  cursor:pointer;
  font-size:13px;
  display:flex; align-items:center; justify-content:center;
}

/* ---------------- FLOATING ORDER PANEL ---------------- */
.order-fab{
  position:fixed;
  bottom:20px; right:20px;
  z-index:50;
  background: var(--ink);
  color: var(--cream);
  border:none;
  padding: 14px 20px;
  border-radius: 999px;
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  box-shadow: var(--shadow);
  cursor:pointer;
  display:flex; align-items:center; gap:10px;
}
.order-fab .count{
  background: var(--orange-dark);
  color:#fff;
  border-radius:50%;
  width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px;
}

.order-panel{
  position:fixed;
  bottom:0; right:0;
  width: 380px; max-width:100vw;
  max-height: 82vh;
  background: var(--cream);
  border-top-left-radius: 10px;
  box-shadow: -4px -4px 24px rgba(0,0,0,0.2);
  transform: translateY(110%);
  transition: transform .28s ease;
  z-index: 60;
  display:flex; flex-direction:column;
}
.order-panel.open{ transform: translateY(0); }

.order-header{
  padding: 16px 18px;
  border-bottom: 2px dashed var(--ink);
  display:flex; justify-content:space-between; align-items:center;
  background: repeating-linear-gradient(45deg, transparent 0 10px, rgba(0,0,0,0.02) 10px 20px);
}
.order-header h3{ font-family:'Baloo 2'; font-size:16px; text-transform:uppercase; }
.close-panel{ background:none; border:none; font-size:20px; cursor:pointer; }

.order-list{
  padding: 10px 18px;
  overflow-y:auto;
  flex:1;
}
.order-item{
  display:flex; gap:10px; align-items:center;
  padding: 10px 0;
  border-bottom: 1px dotted #c9bd9c;
}
.order-item img{ width:44px; height:44px; object-fit:cover; border-radius:4px; flex-shrink:0; }
.order-item-info{ flex:1; }
.order-item-name{ font-weight:600; font-size:14px; }
.order-item-meta{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:#6b6558; }
.order-item-remove{ background:none; border:none; color:var(--orange-dark); cursor:pointer; font-size:16px; }

.order-footer{
  padding: 16px 18px 20px;
  border-top: 2px solid var(--ink);
}
.order-total{
  display:flex; justify-content:space-between;
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  font-size: 18px;
  margin-bottom: 14px;
}
.send-wa{
  width:100%;
  background: var(--wa-green);
  color:#fff;
  border:none;
  padding: 14px;
  border-radius: 8px;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.send-wa:hover{ filter:brightness(1.05); }
.send-wa:disabled{ opacity:0.5; cursor:not-allowed; }

.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.35);
  z-index:55; display:none;
}
.overlay.show{ display:block; }

/* ---------------- MODAL (admin: add/edit product) ---------------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  z-index:100; display:none;
  align-items:center; justify-content:center;
  padding: 20px;
}
.modal-overlay.show{ display:flex; }
.modal{
  background: var(--cream);
  width: 460px; max-width:100%;
  max-height: 90vh; overflow-y:auto;
  border-radius: 8px;
  padding: 24px;
  box-shadow: var(--shadow);
}
.modal h3{ font-family:'Baloo 2'; font-size:18px; margin-bottom:16px; text-transform:uppercase; }
.field{ margin-bottom:14px; }
.field label{
  display:block; font-family:'IBM Plex Mono', monospace; font-size:12px;
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; color:#57523f;
}
.field input[type=text], .field input[type=number], .field textarea, .field select{
  width:100%; padding:10px; border:2px solid var(--ink); border-radius:4px;
  font-family:'Work Sans', sans-serif; font-size:14px; background:#fff;
}
.field textarea{ resize:vertical; min-height:70px; }
.field-row{ display:flex; gap:12px; }
.field-row .field{ flex:1; }

.img-preview{
  width:100%; aspect-ratio:1/1; max-width:160px;
  background:#efe9d8; border:2px dashed var(--ink); border-radius:6px;
  overflow:hidden; margin-bottom:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; color:#999; text-align:center;
}
.img-preview img{ width:100%; height:100%; object-fit:cover; }

.modal-actions{ display:flex; gap:10px; margin-top:18px; }
.btn-primary{
  flex:1; background: var(--ink); color:var(--cream); border:none;
  padding:12px; border-radius:6px; font-weight:600; cursor:pointer;
}
.btn-secondary{
  flex:1; background:transparent; border:2px solid var(--ink); color:var(--ink);
  padding:12px; border-radius:6px; font-weight:600; cursor:pointer;
}
.btn-danger{
  background: var(--orange-dark); color:#fff; border:none;
  padding:12px 16px; border-radius:6px; font-weight:600; cursor:pointer;
}

.toast{
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background: var(--ink); color:var(--cream);
  padding: 12px 22px; border-radius: 999px;
  font-family:'IBM Plex Mono', monospace; font-size:13px;
  z-index: 200; opacity:0; transition: opacity .25s ease;
  pointer-events:none;
}
.toast.show{ opacity:1; }

footer{
  position:relative; z-index:1;
  text-align:center; padding: 30px 16px 10px;
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; color:#6b6558;
}

@media (max-width:480px){
  .order-panel{ width:100%; }
}
</style>
</head>

  <svg class="hero-wave" viewBox="0 0 500 40" preserveAspectRatio="none"><path d="M0,20 C125,45 375,-5 500,20 L500,40 L0,40 Z" fill="#FCF3E7"></path></svg>
</header>

<div class="filters" id="filters"></div>

<main class="grid" id="grid"></main>

<footer>
  Catálogo Curiosi · pedidos directos por WhatsApp
</footer>

<!-- Botón flotante -->
<button class="order-fab" id="orderFab">
  🧾 Ver pedido <span class="count" id="fabCount">0</span>
</button>

<div class="overlay" id="overlay"></div>

<!-- Panel de pedido -->
<div class="order-panel" id="orderPanel">
  <div class="order-header">
    <h3>Tu Pedido</h3>
    <button class="close-panel" id="closePanel">✕</button>
  </div>
  <div class="order-list" id="orderList"></div>
  <div class="order-footer">
    <div class="order-total">
      <span>Total</span>
      <span id="orderTotal">S/ 0.00</span>
    </div>
    <button class="send-wa" id="sendWaBtn" disabled>
      💬 Enviar pedido por WhatsApp
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>


<script>
/* ============================================================
   CONFIGURACIÓN DE LA TIENDA
   ============================================================ */
const CONFIG = {
  storeName: "Curiosi",
  whatsappNumber: "51962599148", // sin "+", sin espacios
  currency: "S/"
};

document.getElementById('storeNameDisplay').textContent = CONFIG.storeName;

/* Productos de respaldo, solo se usan si products.json no carga
   (por ejemplo si abres el archivo directo en el navegador en vez
   de verlo publicado en GitHub Pages). */
const FALLBACK_PRODUCTS = [
  {
    id: "p1",
    name: "Producto de ejemplo",
    description: "Edita products.json en GitHub para reemplazar este producto.",
    price: 0,
    category: "Otros",
    image: "https://placehold.co/400x400/E7A874/33220F?text=Sin+foto"
  }
];

/* ============================================================
   ESTADO
   ============================================================ */
let products = [];
let cart = {}; // { productId: qty }
let activeCategory = "Todos";

async function loadProducts(){
  try{
    // el "?v=" evita que GitHub Pages sirva una versión vieja en caché
    const res = await fetch('products.json?v=' + Date.now());
    if(!res.ok) throw new Error('No se pudo leer products.json');
    const data = await res.json();
    if(!Array.isArray(data) || data.length === 0) throw new Error('products.json vacío');
    products = data;
  }catch(e){
    console.warn('Usando catálogo de respaldo:', e.message);
    products = FALLBACK_PRODUCTS;
    showToast('No se pudo cargar products.json, mostrando catálogo de ejemplo');
  }
}

/* ============================================================
   RENDER: FILTROS
   ============================================================ */
function renderFilters(){
  const cats = ["Todos", ...new Set(products.map(p => p.category))];
  const el = document.getElementById('filters');
  el.innerHTML = cats.map(c =>
    `<button class="chip ${c===activeCategory?'active':''}" data-cat="${c}">${c}</button>`
  ).join('');
  el.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeCategory = btn.dataset.cat;
      renderFilters();
      renderGrid();
    });
  });
}

/* ============================================================
   RENDER: GRID DE PRODUCTOS
   ============================================================ */
function renderGrid(){
  const grid = document.getElementById('grid');
  const list = activeCategory === "Todos" ? products : products.filter(p=>p.category===activeCategory);

  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state">No hay productos en esta categoría todavía.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const qty = cart[p.id] || 0;
    return `
    <div class="card" data-id="${p.id}">
      <div class="tag-edge"></div>
      <div class="card-img-wrap">
        <img src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">
      </div>
      <div class="card-body">
        <span class="card-category">${escapeHtml(p.category)}</span>
        <span class="card-name">${escapeHtml(p.name)}</span>
        <p class="card-desc">${escapeHtml(p.description)}</p>
        <div class="card-price-row">
          <span class="card-price">${CONFIG.currency} ${Number(p.price).toFixed(2)}</span>
          <div class="barcode"></div>
        </div>
        <div class="card-controls">
          <div class="qty-control">
            <button class="qty-minus">−</button>
            <input type="text" class="qty-input" value="${qty}" readonly>
            <button class="qty-plus">+</button>
          </div>
          <button class="add-btn ${qty>0?'added':''}">${qty>0 ? 'En pedido' : 'Agregar'}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // listeners
  grid.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;
    const minus = card.querySelector('.qty-minus');
    const plus = card.querySelector('.qty-plus');
    const input = card.querySelector('.qty-input');
    const addBtn = card.querySelector('.add-btn');

    plus.addEventListener('click', ()=>{
      cart[id] = (cart[id]||0) + 1;
      input.value = cart[id];
      addBtn.textContent = 'En pedido';
      addBtn.classList.add('added');
      updateOrderUI();
    });
    minus.addEventListener('click', ()=>{
      if(!cart[id]) return;
      cart[id] = Math.max(0, cart[id]-1);
      if(cart[id]===0) delete cart[id];
      input.value = cart[id]||0;
      if(!cart[id]){ addBtn.textContent='Agregar'; addBtn.classList.remove('added'); }
      updateOrderUI();
    });
    addBtn.addEventListener('click', ()=>{
      if(!cart[id]){
        cart[id] = 1;
        input.value = 1;
        addBtn.textContent = 'En pedido';
        addBtn.classList.add('added');
        updateOrderUI();
      }
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

/* ============================================================
   CARRITO / PANEL DE PEDIDO
   ============================================================ */
function updateOrderUI(){
  const ids = Object.keys(cart);
  const fabCount = document.getElementById('fabCount');
  const orderList = document.getElementById('orderList');
  const orderTotal = document.getElementById('orderTotal');
  const sendBtn = document.getElementById('sendWaBtn');

  const totalItems = ids.reduce((sum,id)=> sum + cart[id], 0);
  fabCount.textContent = totalItems;

  if(ids.length === 0){
    orderList.innerHTML = `<p style="text-align:center;color:#8a8368;padding:30px 0;font-family:'IBM Plex Mono';font-size:13px;">Tu pedido está vacío</p>`;
    orderTotal.textContent = `${CONFIG.currency} 0.00`;
    sendBtn.disabled = true;
    return;
  }

  let total = 0;
  orderList.innerHTML = ids.map(id=>{
    const p = products.find(pr=>pr.id===id);
    if(!p) return '';
    const qty = cart[id];
    const subtotal = p.price * qty;
    total += subtotal;
    return `
      <div class="order-item" data-id="${id}">
        <img src="${p.image}" alt="">
        <div class="order-item-info">
          <div class="order-item-name">${escapeHtml(p.name)}</div>
          <div class="order-item-meta">${qty} x ${CONFIG.currency}${p.price.toFixed(2)} = ${CONFIG.currency}${subtotal.toFixed(2)}</div>
        </div>
        <button class="order-item-remove">✕</button>
      </div>
    `;
  }).join('');

  orderTotal.textContent = `${CONFIG.currency} ${total.toFixed(2)}`;
  sendBtn.disabled = false;

  orderList.querySelectorAll('.order-item-remove').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const id = e.target.closest('.order-item').dataset.id;
      delete cart[id];
      updateOrderUI();
      renderGrid();
    });
  });
}

document.getElementById('orderFab').addEventListener('click', ()=>{
  document.getElementById('orderPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
});
document.getElementById('closePanel').addEventListener('click', closeOrderPanel);
document.getElementById('overlay').addEventListener('click', ()=>{
  closeOrderPanel();
});
function closeOrderPanel(){
  document.getElementById('orderPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('sendWaBtn').addEventListener('click', ()=>{
  const ids = Object.keys(cart);
  if(ids.length===0) return;

  let total = 0;
  let lines = [`Hola! Quiero hacer este pedido:`, ``];
  ids.forEach((id, idx)=>{
    const p = products.find(pr=>pr.id===id);
    if(!p) return;
    const qty = cart[id];
    const subtotal = p.price*qty;
    total += subtotal;
    lines.push(`${idx+1}. ${p.name} x${qty} — ${CONFIG.currency}${subtotal.toFixed(2)}`);
  });
  lines.push(``, `Total: ${CONFIG.currency}${total.toFixed(2)}`, ``, `Quedo atento(a), gracias!`);

  const text = encodeURIComponent(lines.join('\n'));
  const url = `https://wa.me/${CONFIG.whatsappNumber}?text=${text}`;
  window.open(url, '_blank');
});

/* ============================================================
   TOAST
   ============================================================ */
let toastTimeout;
function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(()=> toast.classList.remove('show'), 2200);
}

/* ============================================================
   INICIO
   ============================================================ */
(async function init(){
  await loadProducts();
  renderFilters();
  renderGrid();
  updateOrderUI();
})();
</script>
</body>
</html>
